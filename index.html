<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #c0392b; /* A classic red for construction alerts */
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚧 Under Construction</h1>
        <p>Our website is currently undergoing maintenance. We'll be back soon!</p>
    </div>
</body>
</html>
